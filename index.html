<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escritório Digital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f2f1ed;--surface:#fff;--navy:#1b2a4a;--navy2:#263a63;
  --text:#1b2a4a;--muted:#64748b;--faint:#94a3b8;
  --border:rgba(27,42,74,.1);--border2:rgba(27,42,74,.22);
  --red:#dc2626;--red-bg:#fef2f2;--red-b:#fecaca;
  --ora:#b45309;--ora-bg:#fffbeb;--ora-b:#fde68a;
  --grn:#15803d;--grn-bg:#f0fdf4;--grn-b:#bbf7d0;
  --blu:#1d4ed8;--blu-bg:#eff6ff;--blu-b:#bfdbfe;
  --amb:#92400e;--amb-bg:#fffbeb;--amb-b:#fcd34d;
  --r:8px;--rl:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--blu);}a:hover{text-decoration:underline;}

/* UPDATE BAR */
#ubar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);box-shadow:0 2px 12px rgba(0,0,0,.25);}
#utoggle{width:100%;padding:9px 20px;background:transparent;border:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
#utoggle:hover{background:var(--navy2);}
#upanel{padding:10px 20px 14px;border-top:1px solid rgba(255,255,255,.12);display:none;}
#ucmd{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--r);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;padding:10px 12px;resize:vertical;min-height:70px;outline:none;}
#ucmd::placeholder{color:rgba(255,255,255,.4);}
#ucmd:focus{border-color:rgba(255,255,255,.5);}
#uactions{display:flex;gap:8px;margin-top:8px;align-items:center;}
#ufeedback{font-size:11px;color:#86efac;flex:1;}
.btn-apply{padding:7px 18px;background:#fff;color:var(--navy);border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-apply:hover{background:#e2e8f0;}
.btn-uhelp{padding:7px 10px;background:transparent;border:1px solid rgba(255,255,255,.25);border-radius:var(--r);color:rgba(255,255,255,.7);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.45);align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:var(--rl);padding:24px;width:92%;max-width:580px;max-height:90vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-hdr h3{font-size:15px;font-weight:600;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;}

/* LAYOUT */
#app{max-width:1120px;margin:0 auto;padding:20px;}
#hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
#hdr h1{font-size:20px;font-weight:600;}
#hdr p{font-size:12px;color:var(--muted);margin-top:2px;}
#hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#sync-badge{font-size:11px;color:var(--faint);}
.alert-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-grn{background:var(--grn-bg);color:var(--grn);}
.hdr-btn{padding:6px 12px;background:transparent;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;color:var(--muted);}
.hdr-btn:hover{background:var(--surface);}

/* TABS */
#tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;}
.tab{padding:8px 16px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);}

/* METRICS */
.mets{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:20px;}
.met{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;}
.met-lbl{font-size:11px;color:var(--muted);font-weight:500;}
.met-val{font-size:22px;font-weight:600;margin-top:4px;}

/* ALERTS */
.alert-danger{background:var(--red-bg);border:1px solid var(--red-b);border-radius:var(--rl);padding:12px 16px;margin-bottom:16px;}
.alert-danger h4{font-size:10px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.alert-danger li{font-size:12px;color:var(--red);padding:3px 0;border-top:1px solid var(--red-b);list-style:none;}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.dash-sec h3{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.prazo-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
.pbox{min-width:40px;height:40px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.prov-row{padding:8px 0;border-bottom:1px solid var(--border);}
.prov-row h4{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prov-row p{font-size:10px;color:var(--muted);margin-top:1px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.wait-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.chip-ora{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--ora-bg);color:var(--ora);border:1px solid var(--ora-b);}
.pje-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pje-a{display:block;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;text-decoration:none;}
.pje-a:hover{border-color:var(--navy);}
.pje-a h4{font-size:12px;font-weight:600;color:var(--navy);}
.pje-a p{font-size:10px;color:var(--blu);margin-top:2px;}

/* CASOS */
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.filters{display:flex;gap:6px;}
.fbtn{padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;color:var(--muted);}
.fbtn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-new{padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-new:hover{background:var(--navy2);}
.casos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;border-left:3px solid transparent;}
.ccard.v-urgent{border-left-color:var(--red);border-color:var(--red-b);}
.ccard.v-near{border-left-color:var(--ora);border-color:var(--ora-b);}
.ccard.v-car{border-left-color:var(--amb);border-color:var(--amb-b);}
.ccar-badge{display:inline-block;background:var(--amb-bg);color:var(--amb);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500;margin-bottom:5px;}
.ccard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px;}
.ccard-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.ccard-meta{font-size:10px;color:var(--muted);margin-bottom:5px;}
.ccard-subj{font-size:11px;color:var(--muted);margin-bottom:8px;}
.ccard-next{background:#f8f7f4;border-radius:6px;padding:7px 9px;margin-bottom:8px;}
.ccard-next-lbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:500;}
.ccard-next-txt{font-size:11px;margin-top:2px;}
.ccard-foot{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:5px;}
.b-info{background:var(--blu-bg);color:var(--blu);}
.b-warn{background:var(--ora-bg);color:var(--ora);}
.b-danger{background:var(--red-bg);color:var(--red);}
.b-success{background:var(--grn-bg);color:var(--grn);}
.b-muted{background:#f1f5f9;color:var(--muted);}
.alink{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--muted);cursor:pointer;padding:2px 4px;}
.alink:hover{text-decoration:underline;}
.alink.del{color:var(--red);}

/* FORMS */
.eform{background:#f8f7f4;border:1px solid var(--border);border-radius:var(--rl);padding:16px;margin-bottom:16px;}
.eform-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.eform-hdr h3{font-size:13px;font-weight:600;}
.fg{display:flex;flex-direction:column;gap:3px;}
.fg label{font-size:11px;color:var(--muted);font-weight:500;}
.fg input,.fg select,.fg textarea{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text);background:#fff;outline:none;width:100%;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--navy);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fgrid .full{grid-column:span 2;}
.factions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px;}
.btn{padding:7px 16px;border-radius:var(--r);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;}
.btn-pri{background:var(--navy);color:#fff;border:1px solid var(--navy);}
.btn-pri:hover{background:var(--navy2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-ghost:hover{background:#f1f5f9;}
.btn-sm{padding:4px 10px;font-size:11px;}

/* HONORÁRIOS */
.hcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px;}
.hcard-name{font-size:14px;font-weight:600;margin-bottom:12px;}
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.hbox{background:#f8f7f4;border-radius:var(--r);padding:12px;}
.hbox-lbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;}
.hbox-main{font-size:15px;font-weight:600;margin-bottom:2px;}
.hbox-sub{font-size:11px;color:var(--muted);}
.hbar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:8px;}
.hbar-fill{height:100%;border-radius:2px;transition:width .3s;}
.hbar-pct{font-size:10px;color:var(--muted);margin-top:3px;}
/* honorário detalhe expandido */
.hdet{border:1px solid var(--border);border-radius:var(--rl);padding:14px;margin-bottom:8px;background:#fafaf9;}
.hdet-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.hdet-tipo{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);}
.hdet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;}
.hdet-field{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;}
.hdet-field-lbl{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;font-weight:500;margin-bottom:2px;}
.hdet-field-val{font-size:12px;font-weight:500;}
.hdet-field-val.grn{color:var(--grn);}
.hdet-field-val.red{color:var(--red);}
.hdet-field-val.ora{color:var(--ora);}
.hdet-obs{margin-top:8px;font-size:11px;color:var(--muted);font-style:italic;padding:6px 8px;background:#fff;border-radius:var(--r);border:1px solid var(--border);}
/* form inline de edição de honorário */
.hedit{background:var(--blu-bg);border:1px solid var(--blu-b);border-radius:var(--rl);padding:14px;margin-bottom:8px;}
.hedit-lbl{font-size:11px;font-weight:600;color:var(--blu);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}

/* PROSPECÇÃO */
.pipe{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.pipe-col-h{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:11px 12px;margin-bottom:6px;}
.pcard h4{font-size:12px;font-weight:600;margin-bottom:2px;}
.pcard .psub{font-size:10px;color:var(--muted);}
.pcard .pnotes{font-size:10px;color:var(--muted);font-style:italic;margin-top:3px;}
.pcard .pfu{font-size:9px;color:var(--ora);margin-top:3px;font-weight:500;}
.pcard-foot{display:flex;justify-content:space-between;align-items:center;margin-top:7px;gap:4px;}
.pcard-foot select{font-size:10px;padding:2px 5px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;background:#f8f7f4;flex:1;}

/* CONTÁBIL */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:12px;}
.check-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.check-item input{width:15px;height:15px;cursor:pointer;accent-color:var(--navy);flex-shrink:0;}
.check-item label{font-size:13px;cursor:pointer;}
.check-item.done label{text-decoration:line-through;color:var(--muted);}
.das-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;}
.nf-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}

/* LINKEDIN */
.lipipe{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:16px;}
.licard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:6px;}
.licard p{font-size:12px;margin-bottom:6px;}
.licard small{font-size:10px;color:var(--muted);}
.licard-foot{display:flex;justify-content:space-between;align-items:center;margin-top:6px;gap:4px;}
.licard-foot select{font-size:10px;padding:2px 5px;border:1px solid var(--border2);border-radius:var(--r);font-family:'DM Sans',sans-serif;background:#f8f7f4;flex:1;}

.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
hr{border:none;border-top:1px solid var(--border);margin:16px 0;}
pre{background:#f8f7f4;border:1px solid var(--border);border-radius:var(--r);padding:12px;font-size:11px;line-height:1.7;overflow-x:auto;white-space:pre-wrap;}
.sec-title{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}

@media(max-width:640px){
  .dash-grid,.pje-grid{grid-template-columns:1fr;}
  .casos-grid,.pipe,.lipipe{grid-template-columns:1fr;}
  .fgrid{grid-template-columns:1fr;}
  .fgrid .full{grid-column:span 1;}
  .hgrid,.hdet-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="ubar">
  <button id="utoggle" onclick="toggleU()">
    <span id="utoggle-lbl">↑ COLAR ATUALIZAÇÃO DO CLAUDE</span>
    <span id="sync-badge" style="font-size:11px;opacity:.8"></span>
  </button>
  <div id="upanel">
    <textarea id="ucmd" placeholder="Cole aqui o comando UPDATE do Claude:

UPDATE
caso: Barreira → status: encerrado
caso: Genesys Cumprimento → nextSteps: Contestação protocolada

    <div id="uactions">
      <span id="ufeedback"></span>
      <button class="btn-uhelp" onclick="openModal('help')">? Formato</button>
      <button class="btn-apply" onclick="applyUpdate()">Aplicar ↵</button>
    </div>
  </div>
</div>

<div id="modal-main" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr"><h3 id="modal-title"></h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <div><h1>Escritório Digital</h1><p id="hdr-date"></p></div>
    <div id="hdr-right">
      <div id="hdr-alert"></div>
      <button class="hdr-btn" onclick="forceSync()">↻ Sync</button>
      <button class="hdr-btn" onclick="exportResume()">Exportar para Claude</button>
    </div>
  </div>
  <div id="tabs"></div>
  <div id="tab-body"></div>
</div>

async function syncFromSheet(){
  setSt('syncing');renderBadge();
  try{
    const r=await fetch(SHEET_URL+'?secret='+SECRET+'&t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    if(d.casos&&d.casos.length){
      S.casos=d.casos;
      if(d.prospeccao)S.prospeccao=d.prospeccao;
      if(d.linkedin)S.linkedin=d.linkedin;
      if(d.contabil)S.contabil=d.contabil;
      saveLocal();
    }
    setSt('ok');
  }catch(e){console.error(e);setSt('error');}
  renderBadge();render();
}
async function saveData(){
  saveLocal();setSt('syncing');renderBadge();
  try{
    const payload={secret:SECRET,casos:S.casos,prospeccao:S.prospeccao,linkedin:S.linkedin,contabil:S.contabil};
    await fetch(SHEET_URL,{method:'POST',mode:'no-cors',body:new URLSearchParams({data:JSON.stringify(payload)})});
    setSt('ok');
  }catch(e){setSt('error');}
  renderBadge();
}

function uid(){return Math.random().toString(36).substr(2,9);}
function fDate(d){if(!d)return'';try{return new Date(d+'T12:00:00').toLocaleDateString('pt-BR');}catch{return d;}}
function fCur(v){return(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getDL(c){if(!c.deadline)return null;const t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(c.deadline+'T12:00:00')-t)/864e5);}
function sLabel(s){return{em_andamento:'Em andamento',aguardando:'Aguardando',encerrado:'Encerrado',liminar:'Liminar',recurso:'Recurso'}[s]||s||'Em andamento';}
function sBadge(s){return{em_andamento:'b-info',aguardando:'b-warn',encerrado:'b-success',liminar:'b-danger',recurso:'b-muted'}[s]||'b-muted';}
function sortC(l){
  return[...l].sort((a,b)=>{
    const da=getDL(a),db=getDL(b),ao=da!==null&&da<0,bo=db!==null&&db<0;
    if(ao&&!bo)return-1;if(!ao&&bo)return 1;
    if(da!==null&&db!==null)return da-db;
    if(da!==null)return-1;if(db!==null)return 1;
    const ae=a.status==='encerrado',be=b.status==='encerrado';
    if(ae&&!be)return 1;if(!ae&&be)return-1;
    return a.client.localeCompare(b.client,'pt-BR');
  });
}
function getUrgent(){
  const items=[];const t=new Date();t.setHours(0,0,0,0);const in7=new Date(t.getTime()+7*864e5);
  S.casos.forEach(c=>{if(!c.deadline)return;const d=new Date(c.deadline+'T12:00:00');
    if(d<t)items.push({sort:d.getTime(),label:'VENCIDO: '+c.client+' ('+fDate(c.deadline)+')'});
    else if(d<=in7)items.push({sort:d.getTime(),label:Math.ceil((d-t)/864e5)+'d: '+c.client+' — '+fDate(c.deadline)});
  });
  items.sort((a,b)=>a.sort-b.sort);
  const now=new Date();const mk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const cd=S.contabil[mk]||{};
  if(!cd.dasPago){const dd=new Date(now.getFullYear(),now.getMonth(),20);const dl=Math.ceil((dd-now)/864e5);
    if(dl<=7)items.push({label:'DAS vence '+(dl<=0?'HOJE/ATRASADO':'em '+dl+'d')+' — dia 20'});}
  // honorários com followup vencido
  S.casos.forEach(c=>(c.honorarios||[]).forEach(h=>{
    if(h.followupDate&&new Date(h.followupDate+'T12:00:00')<=now)
      items.push({label:'Cobrar honorários: '+c.client+' ('+fDate(h.followupDate)+')'});
  }));
  S.prospeccao.forEach(p=>{if(p.stage==='aguardando'&&p.followupDate&&new Date(p.followupDate+'T12:00:00')<=now)items.push({label:'Follow-up: '+p.name});});
  return items.map(i=>i.label);
}

function showFb(msg,err){const el=document.getElementById('ufeedback');el.textContent=msg;el.style.color=err?'#fca5a5':'#86efac';setTimeout(()=>el.textContent='',4000);}
function applyUpdate(){
  const raw=document.getElementById('ucmd').value.trim();
  if(!raw.toUpperCase().startsWith('UPDATE')){showFb('⚠ Deve começar com UPDATE',true);return;}
  const lines=raw.split('\n').slice(1).map(l=>l.trim()).filter(l=>l&&l.includes('→'));
  let ok=0;const errs=[];
  for(const line of lines){
    const[sel,...rest]=line.split('→');const asgn=rest.join('→').trim();
    const ci=asgn.indexOf(':');if(ci<0)continue;
    const field=asgn.slice(0,ci).trim().toLowerCase(),value=asgn.slice(ci+1).trim();
    const slo=sel.trim().toLowerCase();
    if(slo.startsWith('caso:')){
      const q=slo.slice(5).trim();const c=S.casos.find(x=>x.client.toLowerCase().includes(q));
      if(!c){errs.push(q);continue;}applyC(c,field,value);ok++;
    }else if(slo.startsWith('prospecção:')||slo.startsWith('prospeccao:')){
      const q=slo.replace(/prospec[çc][aã]o:/,'').trim();
      const p=S.prospeccao.find(x=>x.name.toLowerCase().includes(q));
      if(!p){errs.push(q);continue;}applyP(p,field,value);ok++;
    }
  }
  if(ok>0){saveData();render();showFb('✓ '+ok+' atualização'+(ok>1?'ões':'')+' aplicada'+(ok>1?'s':''));document.getElementById('ucmd').value='';}
  else showFb('⚠ Nenhuma atualização'+(errs.length?' — não encontrado: '+errs[0]:''),true);
}
function applyC(c,field,value){
  const fm={status:'status',nextsteps:'nextSteps',providencias:'nextSteps','providências':'nextSteps',deadline:'deadline',prazo:'deadline',processnumber:'processNumber',processo:'processNumber',subject:'subject',assunto:'subject',tribunal:'tribunal'};
  const sm={'em andamento':'em_andamento','em_andamento':'em_andamento',andamento:'em_andamento',aguardando:'aguardando',encerrado:'encerrado',liminar:'liminar',recurso:'recurso'};
  const f=fm[field]||field;
  if(f==='status')c.status=sm[value.toLowerCase()]||value;
  else if(f==='deadline'){if(/^\d{2}\/\d{2}\/\d{4}$/.test(value)){const[d,m,y]=value.split('/');c.deadline=y+'-'+m+'-'+d;}else c.deadline=value;}
  else if(f in c)c[f]=value;
}
function applyP(p,field,value){
  const fm={stage:'stage','estágio':'stage',estagio:'stage',notes:'notes',subject:'subject',assunto:'subject',followup:'followupDate',lastcontact:'lastContact'};
  const sm={'contato a ser feito':'a_contatar','a contatar':'a_contatar','contato feito':'contato',contato:'contato','análise':'analise',analise:'analise',pesquisa:'pesquisa','proposta enviada':'proposta',proposta:'proposta','aguardando retorno':'aguardando',aguardando:'aguardando',contratou:'fechado',fechado:'fechado','não contratou':'perdido',perdido:'perdido'};
  const f=fm[field.toLowerCase()]||field;
  if(f==='stage')p.stage=sm[value.toLowerCase()]||value;
  else if(f in p)p[f]=value;
}

    if(h.proximaVencimento&&h.proximaParcela){const d=new Date(h.proximaVencimento+'T12:00:00');const dl=Math.ceil((d-now)/864e5);proxVenc.push({client:c.client,valor:h.proximaParcela,venc:h.proximaVencimento,dl});}
  }));

</div>
<div class="factions">
  <button class="btn btn-ghost" onclick="cancelHonEdit()">Cancelar</button>
  <button class="btn btn-pri" onclick="saveHonEdit()">Salvar alterações</button>
</div>
</div>`:''}
${S.casos.map(c=>{

    return`<div class="hdet">

      ${h.proximaParcela?`<div class="hdet-field"><div class="hdet-field-lbl">Próxima parcela</div><div class="hdet-field-val">${fCur(h.proximaParcela)}${h.proximaVencimento?'<div style="font-size:10px;color:var(--muted)">Vence: '+fDate(h.proximaVencimento)+'</div>':''}</div></div>`:''}
      ${h.followupDate?`<div class="hdet-field" style="background:${fuVenc?'var(--red-bg)':''}"><div class="hdet-field-lbl">Follow-up cobrança</div><div class="hdet-field-val ${fuVenc?'red':''}">${fDate(h.followupDate)}${fuVenc?' ⚠':''}</div></div>`:''}

</div>`:''}

      <p style="font-size:11px;color:var(--muted);margin-top:4px"><b>Estágios:</b> a contatar | contato feito | análise | pesquisa | proposta | aguardando | contratou | perdido</p>`
  };
  document.getElementById('modal-body').innerHTML=(bodies[type]||(() => ''))();
  document.getElementById('modal-main').classList.add('open');
}
function closeModal(){document.getElementById('modal-main').classList.remove('open');}

// ══ SAVES ══════════════════════════════════════════════
function saveC(eid){
  const c=gv('fi-c').trim();if(!c){alert('Informe o cliente');return;}
  const caso={id:eid||uid(),client:c,type:gv('fi-t'),tribunal:gv('fi-tr'),processNumber:gv('fi-p').trim(),subject:gv('fi-s').trim(),status:gv('fi-st'),deadline:gv('fi-d'),nextSteps:gv('fi-n').trim(),honorarios:eid?(S.casos.find(x=>x.id===eid)?.honorarios||[]):[]};
  if(eid)S.casos=S.casos.map(x=>x.id===eid?{...caso,group:S.casos.find(x=>x.id===eid)?.group}:x);else S.casos.push(caso);
  saveData();S.editId=null;closeModal();render();
}
function saveHon(){
  const v=parseFloat(gv('mh-v'))||0;if(!v){alert('Informe o valor contratado');return;}
  const c=S.casos.find(x=>x.id===_mm.extra);if(!c)return;
  if(!c.honorarios)c.honorarios=[];
  c.honorarios.push({id:uid(),tipo:gv('mh-t'),valor:v,pago:parseFloat(gv('mh-p'))||0,proximaParcela:parseFloat(gv('mh-pp'))||0,proximaVencimento:gv('mh-pv'),followupDate:gv('mh-fu'),obs:gv('mh-obs').trim()});
  saveData();closeModal();render();
}
function startHonEdit(cid,hid){
  if(S.editHonId===cid&&S.editHonHid===hid){S.editHonId=null;S.editHonHid=null;}
  else{S.editHonId=cid;S.editHonHid=hid;}
  render();
  // scroll to edit form
  setTimeout(()=>{const el=document.querySelector('.hedit');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);
}
function cancelHonEdit(){S.editHonId=null;S.editHonHid=null;render();}
function saveHonEdit(){
  const c=S.casos.find(x=>x.id===S.editHonId);if(!c)return;
  const h=(c.honorarios||[]).find(x=>x.id===S.editHonHid);if(!h)return;
  h.tipo=gv('he-t');h.valor=parseFloat(gv('he-v'))||0;h.pago=parseFloat(gv('he-p'))||0;
  h.proximaParcela=parseFloat(gv('he-pp'))||0;h.proximaVencimento=gv('he-pv');
  h.followupDate=gv('he-fu');h.obs=gv('he-obs').trim();
  S.editHonId=null;S.editHonHid=null;saveData();render();
}
function delHon(cid,hid){
  const c=S.casos.find(x=>x.id===cid);if(!c)return;
  c.honorarios=c.honorarios.filter(h=>h.id!==hid);saveData();render();
}
function saveProsp(){
  const n=gv('mp-n').trim();if(!n){alert('Informe o nome');return;}
  S.prospeccao.push({id:uid(),name:n,stage:gv('mp-s'),subject:gv('mp-su').trim(),notes:gv('mp-no').trim(),lastContact:gv('mp-lc'),followupDate:gv('mp-fu')});
  saveData();closeModal();render();
}
function startProspEdit(id){S.editProspId=S.editProspId===id?null:id;render();setTimeout(()=>{const el=document.querySelector('.eform');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},50);}
function cancelProspEdit(){S.editProspId=null;render();}
function saveProspEdit(id){
  const p=S.prospeccao.find(x=>x.id===id);if(!p)return;
  p.name=gv('pe-n').trim()||p.name;p.subject=gv('pe-s').trim();
  p.notes=gv('pe-no').trim();p.stage=gv('pe-st');
  p.followupDate=gv('pe-fu');p.lastContact=gv('pe-lc');
  S.editProspId=null;saveData();render();
}
function saveNF(){
  const c=gv('mnf-c').trim();if(!c){alert('Informe o cliente');return;}
  const now=new Date();const mk=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  if(!S.contabil[mk])S.contabil[mk]={};if(!S.contabil[mk].nfs)S.contabil[mk].nfs=[];
  S.contabil[mk].nfs.push({id:uid(),client:c,number:gv('mnf-n').trim(),valor:parseFloat(gv('mnf-v'))||0});
  saveData();closeModal();render();
}
function delNF(mk,i){S.contabil[mk].nfs.splice(i,1);saveData();render();}
function saveLI(){
  const c=gv('mli-c').trim();if(!c){alert('Informe o conteúdo');return;}
  S.linkedin.push({id:uid(),content:c,stage:gv('mli-s'),scheduledDate:gv('mli-d')});
  saveData();closeModal();render();
}
function startEdit(id){S.editId=S.editId===id?null:id;render();}
function cancelEdit(){S.editId=null;render();}
function delC(id){if(!confirm('Remover este caso?'))return;S.casos=S.casos.filter(c=>c.id!==id);saveData();render();}
function delSP(id){S.prospeccao=S.prospeccao.filter(p=>p.id!==id);saveData();render();}
function delLI(id){S.linkedin=S.linkedin.filter(p=>p.id!==id);saveData();render();}
function updSP(id,stage){S.prospeccao=S.prospeccao.map(p=>p.id===id?{...p,stage}:p);saveData();render();}
function updLI(id,stage){S.linkedin=S.linkedin.map(p=>p.id===id?{...p,stage}:p);saveData();render();}
function ckCo(key,field,val){if(!S.contabil[key])S.contabil[key]={};S.contabil[key][field]=val;saveData();render();}

function exportResume(){
  const lines=['=== ESTADO ATUAL — ESCRITÓRIO DIGITAL ===','','CASOS ATIVOS:'];
  S.casos.filter(c=>c.status!=='encerrado').forEach(c=>{
    lines.push('• '+c.client+' ['+sLabel(c.status)+']'+(c.tribunal?' — '+c.tribunal:'')+(c.processNumber?' ('+c.processNumber+')':''));
    if(c.nextSteps)lines.push('  → '+c.nextSteps.slice(0,120));
  });
  lines.push('','PROSPECÇÕES ATIVAS:');
  S.prospeccao.filter(p=>!['fechado','perdido'].includes(p.stage)).forEach(p=>{
    lines.push('• '+p.name+' ['+STAGES.find(s=>s.id===p.stage)?.label+']'+(p.subject?' — '+p.subject:''));
  });
  const txt=lines.join('\n');
  navigator.clipboard.writeText(txt).then(()=>alert('Copiado! Cole no Claude para sincronizar.')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();alert('Copiado!');
  });
}
